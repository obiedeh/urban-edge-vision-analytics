name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check api vision events analytics telemetry tests examples
      - name: Type check
        run: mypy api vision events analytics telemetry
      - name: Test
        run: pytest -q
      - name: Generate mock inference evidence
        run: python examples/generate_mock_report.py --output examples/mock_inference_report.json
      - name: Validate evidence artifacts
        run: test -s examples/mock_inference_report.json
